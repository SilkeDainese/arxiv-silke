name: QA

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install digest dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest -r setup/requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

      - name: Compile Python entrypoints
        run: python -m py_compile digest.py student_digest.py student_registry.py setup/pure_scraper.py setup/student_presets.py scripts/student_subscription.py scripts/student_admin.py scripts/friend_setup.py relay/api/students.py relay/api/feedback.py relay/api/report.py brand.py
