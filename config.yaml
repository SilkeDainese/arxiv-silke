# ── Your Profile ───────────────────────────────
digest_name: "Science News for Silke"
researcher_name: "Silke S. Dainese"
recipient_email: "dainese@phys.au.dk"

research_context: |
  I study stellar rotation using Gaia DR3 vbroad measurements as a
  proxy for projected rotational velocity (vsini). My main project
  characterises the Kraft break — the temperature boundary where
  magnetic braking switches off — in single-star field dwarfs using
  hierarchical Bayesian modelling. I also work on spin-orbit obliquity
  in exoplanet systems, connecting host star rotation to planetary
  orbital architecture. I care about hot Jupiters, sub-Neptunes,
  planet migration, and tidal interactions. My data comes primarily
  from Gaia, with spectroscopic follow-up from Keck and other
  ground-based facilities.

