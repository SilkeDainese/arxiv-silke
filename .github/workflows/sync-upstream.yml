name: Sync Upstream

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Merge upstream bug fixes
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
        run: |
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "No UPSTREAM_REPO variable configured; skipping sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"

          if git diff --quiet HEAD "upstream/$DEFAULT_BRANCH"; then
            echo "Already up to date with ${UPSTREAM_REPO}."
            exit 0
          fi

          git merge -X ours --no-edit "upstream/$DEFAULT_BRANCH"
          git push origin "HEAD:${DEFAULT_BRANCH}"
